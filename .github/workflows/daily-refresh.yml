name: IPL Dashboard Refresh

on:
  schedule:
    # Every 12 hours: 01:30 UTC and 13:30 UTC (≈ 7:00 AM and 7:00 PM IST)
    - cron: '30 1,13 * * *'
  workflow_dispatch: # allow manual trigger

concurrency:
  group: ipl-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run cloud scraper
        env:
          IPL_CLASSIC_COOKIE: ${{ secrets.IPL_CLASSIC_COOKIE }}
        run: python scripts/cloud_scraper.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/history.json
          git diff --staged --quiet || git commit -m "Refresh: $(date -u '+%d %b %Y %H:%M UTC')"
          git push
