<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#14171F;--bg2:#1a1e28;--surface:#1e222e;
  --red:#FF1919;--red2:#ff4444;
  --text:#ffffff;--text2:#8b92a5;--text3:#4a5068;
  --border:#252a38;
}
html{scroll-behavior:smooth;}
body{font-family:'Inter Tight',-apple-system,'Segoe UI',sans-serif;font-weight:400;
  background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}

/* ── FLOATING SHAPES ── */
#shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}

/* ── PAGE ── */
.page{position:relative;z-index:1;padding:60px 24px 80px;}
.wrap{max-width:960px;margin:0 auto;}

/* ── HEADER ── */
.hdr{text-align:center;margin-bottom:64px;position:relative;}
.hdr .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:4px;
  text-transform:uppercase;color:var(--red);margin-bottom:20px;
  opacity:.9;}
.hdr h1{font-size:clamp(48px,10vw,96px);font-weight:900;letter-spacing:-2px;
  line-height:.95;color:#fff;margin-bottom:16px;}
.hdr h1 span{color:var(--red);display:inline-block;
  animation:titlePulse 3s ease-in-out infinite alternate;}
@keyframes titlePulse{0%{opacity:.7;transform:scale(1)}100%{opacity:1;transform:scale(1.02)}}
.hdr .sub{font-size:15px;color:var(--text2);font-weight:400;letter-spacing:.5px;}
.hdr .sub strong{color:#fff;font-weight:600;}
.hdr .line{width:60px;height:3px;background:var(--red);margin:24px auto 0;border-radius:2px;}

/* ── MATCH STRIP ── */
.match-strip{display:flex;align-items:center;justify-content:center;gap:32px;
  padding:32px;margin-bottom:48px;border-radius:16px;
  background:var(--surface);border:1px solid var(--border);
  transition:all .4s;}
.match-strip:hover{border-color:rgba(255,25,25,.2);box-shadow:0 0 40px rgba(255,25,25,.05);}
.match-meta{text-align:center;}
.match-meta .label{font-size:10px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:var(--text3);}
.match-meta .num{font-size:20px;font-weight:900;color:var(--red);margin-top:4px;}
.match-vs{display:flex;align-items:center;gap:20px;}
.match-team{text-align:center;}
.match-team .abbr{font-size:clamp(36px,5vw,52px);font-weight:900;letter-spacing:2px;
  transition:all .4s;}
.match-team:first-child .abbr{color:#fff;}
.match-team:last-child .abbr{color:var(--text2);}
.match-team .full{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500;}
.match-dot{font-size:14px;font-weight:300;color:var(--text3);letter-spacing:4px;
  text-transform:uppercase;}
.match-time{font-size:11px;color:var(--text3);margin-top:2px;}

/* ── SECTION ── */
.section{margin-bottom:48px;}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.section-head .dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}
.section-head h2{font-size:13px;font-weight:800;letter-spacing:4px;
  text-transform:uppercase;color:var(--text2);}

/* ── LEADERBOARD ── */
.lb-item{display:flex;align-items:center;gap:16px;padding:18px 20px;
  border-radius:12px;transition:all .35s cubic-bezier(.4,0,.2,1);cursor:default;
  border:1px solid transparent;margin-bottom:4px;}
.lb-item:hover{background:var(--surface);border-color:var(--border);transform:translateX(6px);}
.lb-rank{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;border-radius:10px;flex-shrink:0;
  transition:all .35s;}
.r1{background:var(--red);color:#fff;box-shadow:0 4px 20px rgba(255,25,25,.3);}
.r2{background:rgba(255,255,255,.1);color:#fff;}
.r3{background:rgba(255,255,255,.06);color:var(--text2);}
.rn{background:rgba(255,255,255,.03);color:var(--text3);}
.lb-info{flex:1;min-width:0;}
.lb-name{font-size:17px;font-weight:700;color:#fff;transition:color .3s;}
.lb-item:hover .lb-name{color:var(--red);}
.lb-bar{height:3px;background:rgba(255,255,255,.04);border-radius:2px;margin-top:8px;overflow:hidden;}
.lb-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.lb-fill.f1{background:var(--red);}
.lb-fill.f2{background:rgba(255,255,255,.3);}
.lb-fill.f3{background:rgba(255,255,255,.15);}
.lb-fill.fn{background:rgba(255,255,255,.08);}
.lb-pts{font-size:22px;font-weight:900;color:#fff;min-width:70px;text-align:right;
  font-variant-numeric:tabular-nums;transition:color .3s;}
.lb-item:hover .lb-pts{color:var(--red);}

/* ── PLAYING XI ── */
.pxi-item{display:flex;align-items:center;gap:16px;padding:16px 12px;
  border-bottom:1px solid rgba(255,255,255,.03);transition:all .3s;}
.pxi-item:last-child{border-bottom:none;}
.pxi-item:hover{background:rgba(255,255,255,.02);}
.pxi-left{display:flex;align-items:center;gap:12px;width:170px;flex-shrink:0;}
.pxi-name{font-size:14px;font-weight:700;color:#fff;}
.pxi-pts{font-size:11px;color:var(--text3);font-weight:500;}
.pxi-players{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.pxi-player{display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:all .3s;cursor:default;}
.pxi-player:hover{transform:translateY(-4px);}
.pxi-avatar{width:48px;height:48px;border-radius:12px;overflow:hidden;position:relative;
  border:2px solid var(--border);transition:all .3s;}
.pxi-player:hover .pxi-avatar{border-color:var(--red);}
.pxi-avatar img{width:100%;height:100%;object-fit:cover;}
.pxi-avatar .ini{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;}
.pxi-pname{font-size:9px;color:var(--text3);text-align:center;max-width:54px;
  line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pxi-chip{font-size:7px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:.5px;}
.pxi-none{font-size:12px;color:var(--text3);font-style:italic;font-weight:400;}
.pxi-head{display:flex;align-items:center;gap:16px;padding:8px 12px;margin-bottom:8px;}
.pxi-head span{font-size:10px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:var(--text3);}
.pxi-head .today{color:var(--red);}

/* ── CHART ── */
.chart-area{position:relative;height:380px;margin-top:8px;}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.fbtn{padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;
  border:1px solid var(--border);border-radius:8px;background:transparent;
  color:var(--text3);transition:all .25s;letter-spacing:.3px;}
.fbtn.on{color:#fff;border-color:currentColor;
  box-shadow:0 0 12px var(--glow,rgba(255,25,25,.2));}
.fbtn:hover{color:var(--text2);border-color:var(--text3);}

/* ── FOOTER ── */
footer{text-align:center;padding:40px 0;color:var(--text3);font-size:11px;
  letter-spacing:3px;font-weight:500;text-transform:uppercase;}
footer span{color:var(--red);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px;}

/* ── ENTRANCE ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.section{animation:fadeIn .7s ease-out both;}
.section:nth-child(2){animation-delay:.1s;}
.section:nth-child(3){animation-delay:.2s;}
.section:nth-child(4){animation-delay:.3s;}

@media(max-width:640px){
  .match-strip{flex-direction:column;gap:16px;padding:24px 16px;}
  .pxi-left{width:130px;}
  .pxi-head{display:none;}
  .lb-item{padding:14px 12px;}
}
</style>

  const shapes=[];
  function make(){
    const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
    s.setAttribute("viewBox","0 0 24 24");
    s.style.position="absolute";
    const size=Math.random()*20+8;
    s.style.width=size+"px";s.style.height=size+"px";
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.opacity="0";
    s.style.transition="opacity 1s";
    const color=colors[Math.floor(Math.random()*colors.length)];
    // randomly choose circle or diamond
    if(Math.random()>.5){
      const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
      c.setAttribute("cx","12");c.setAttribute("cy","12");c.setAttribute("r","10");
      c.setAttribute("fill","none");c.setAttribute("stroke",color);c.setAttribute("stroke-width","1.5");
      s.appendChild(c);
    } else {
      const p=document.createElementNS("http://www.w3.org/2000/svg","polygon");
      p.setAttribute("points","12,2 22,12 12,22 2,12");
      p.setAttribute("fill","none");p.setAttribute("stroke",color);p.setAttribute("stroke-width","1.5");
      s.appendChild(p);
    }
    el.appendChild(s);
    requestAnimationFrame(()=>{s.style.opacity=String(Math.random()*.25+.05)});
    const dur=Math.random()*8000+6000;
    const dx=(Math.random()-.5)*60;
    const dy=-Math.random()*80-20;
    const start=performance.now();
    function animate(now){
      const t=Math.min((now-start)/dur,1);
      s.style.transform=`translate(${dx*t}px,${dy*t}px) rotate(${t*180}deg)`;
      if(t>=.7)s.style.opacity=String((1-t)/.3*parseFloat(s.style.opacity||"0.1"));
      if(t<1)requestAnimationFrame(animate);
      else{s.remove();}
    }
    requestAnimationFrame(animate);
  }
  setInterval(make,500);
  for(let i=0;i<15;i++)setTimeout(make,i*200);
}

const CC=["#FF1919","#FF1919","#FF1919","#FF1919","#FF1919","#FF1919","#FF1919","#FF1919"];
const DASHES=[
  {borderDash:[],label:"solid"},
  {borderDash:[5,5],label:"dashed"},
  {borderDash:[2,4],label:"dotted"},
  {borderDash:[8,3],label:"long-dash"},
  {borderDash:[3,3,6,3],label:"dash-dot"},
  {borderDash:[1,2],label:"tiny-dot"},
  {borderDash:[10,2],label:"thick-dash"},
  {borderDash:[4,4,2,4],label:"pattern"}
];
let chart=null;
const vis={};D.standings.forEach(s=>{vis[s.name]=true;});

function renderAll(){
  document.getElementById("updated").textContent=D.lastUpdated;
  const m=D.nextMatch;
  document.getElementById("mnum").textContent="Match "+m.no;
  document.getElementById("t1").textContent=m.t1;
  document.getElementById("t1f").textContent=m.t1full;
  document.getElementById("t2").textContent=m.t2;
  document.getElementById("t2f").textContent=m.t2full;
  document.getElementById("mtime").textContent=m.time;

  // Leaderboard
  const maxP=Math.max(...D.standings.map(s=>s.pts));
  const lb=document.getElementById("lb");lb.innerHTML="";
  D.standings.forEach(s=>{
    const pct=((s.pts/maxP)*100).toFixed(1);
    const rc=s.rank===1?"r1":s.rank===2?"r2":s.rank===3?"r3":"rn";
    const fc=s.rank===1?"f1":s.rank===2?"f2":s.rank===3?"f3":"fn";
    lb.innerHTML+=`<div class="lb-item"><div class="lb-rank ${rc}">${s.rank}</div>
      <div class="lb-info"><div class="lb-name">${s.name}</div>
      <div class="lb-bar"><div class="lb-fill ${fc}" style="width:${pct}%"></div></div></div>
      <div class="lb-pts">${s.pts}</div></div>`;
  });

  // Playing XI
  const pxi=document.getElementById("pxi");
  let html=`<div class="pxi-head"><span style="width:170px">Manager</span>
    <span class="today">Playing Today - Match ${m.no}: ${m.t1} vs ${m.t2}</span></div>`;
  D.standings.forEach(s=>{
    const players=D.teams[s.name]||[];
    const playing=players.filter(p=>D.todayTeams.includes(p.iplTeam));
    const rc=s.rank===1?"r1":s.rank===2?"r2":s.rank===3?"r3":"rn";
    let ph="";
    if(!playing.length)ph=`<span class="pxi-none">No players in today's match</span>`;
    else ph=playing.map(p=>{
      const bg=tc(p.iplTeam),tx=tt(p.iplTeam);
      const cap=p.isC?" (C)":p.isVC?" (VC)":"";
      const sn=p.name.split(" ").map((w,i)=>i===0?w[0]+".":w).join(" ");
      return`<div class="pxi-player" title="${p.name} (${p.iplTeam})${cap}">
        <div class="pxi-avatar" style="border-color:${bg}">
          <img src="${imgUrl(p.name)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
          <div class="ini" style="background:${bg};display:none">${ini(p.name)}</div>
        </div><div class="pxi-pname">${sn}${cap}</div>
        <div class="pxi-chip" style="background:${bg};color:${tx}">${p.iplTeam}</div></div>`;
    }).join("");
    html+=`<div class="pxi-item"><div class="pxi-left">
      <div class="lb-rank ${rc}" style="width:32px;height:32px;font-size:12px;border-radius:8px">${s.rank}</div>
      <div><div class="pxi-name">${s.name}</div><div class="pxi-pts">${s.pts} pts</div></div>
    </div><div class="pxi-players">${ph}</div></div>`;
  });
  pxi.innerHTML=html;

  // Filters
  const fw=document.getElementById("filters");fw.innerHTML="";
  D.standings.forEach((s,i)=>{
    const c=CC[i];const b=document.createElement("button");
    b.className="fbtn on";b.dataset.name=s.name;
    b.style.color=c;b.style.borderColor=c;b.style.setProperty("--glow",c+"44");
    b.textContent=s.name;
    b.onclick=()=>{vis[s.name]=!vis[s.name];b.classList.toggle("on",vis[s.name]);
      if(chart){chart.setDatasetVisibility(D.standings.findIndex(x=>x.name===s.name),vis[s.name]);chart.update();}};
    fw.appendChild(b);
  });
  [["All",true],["None",false]].forEach(([l,v])=>{
    const b=document.createElement("button");b.className="fbtn"+(v?" on":"");
    b.style.color="#4a5068";b.style.borderColor="#252a38";b.textContent=l;
    b.onclick=()=>{D.standings.forEach(s=>{vis[s.name]=v});
      fw.querySelectorAll("[data-name]").forEach(x=>x.classList.toggle("on",v));
      if(chart){D.standings.forEach((_,i)=>chart.setDatasetVisibility(i,v));chart.update();}};
    fw.appendChild(b);
  });

  // Chart
  const ctx=document.getElementById("chart").getContext("2d");
  const ds=D.standings.map((s,i)=>({label:s.name,data:(D.matchPts.cumulative[s.name]||[]).slice(),
    borderColor:"#FF1919",backgroundColor:"#FF1919"+"10",borderWidth:2.5,
    pointRadius:5,pointHoverRadius:9,tension:.4,fill:false,spanGaps:true,
    pointBackgroundColor:"#FF1919",pointBorderColor:"#14171F",pointBorderWidth:2,
    pointHoverBorderColor:"#fff",pointHoverBorderWidth:2}));

  // Plugin to render team names on chart
  const namePlugin={
    afterDatasetsDraw(chart){
      const{ctx:c,chartArea:{right,top,bottom}}=chart;
      D.standings.forEach((s,i)=>{
        const ds=chart.data.datasets[i];
        const meta=chart.getDatasetMeta(i);
        if(!meta.hidden&&ds.data.length>0){
          const lastIdx=ds.data.length-1;
          const lastPt=meta.data[lastIdx];
          if(lastPt){
            c.fillStyle="#ffffff";c.font="bold 12px 'Inter Tight'";
            c.textAlign="left";c.textBaseline="middle";
            c.fillText(s.name.substring(0,12),Math.min(lastPt.x+12,right-80),lastPt.y);
          }
        }
      });
    }
  };

  if(chart)chart.destroy();
  chart=new Chart(ctx,{type:"line",data:{labels:D.matchPts.labels.slice(),datasets:ds},
    plugins:[namePlugin],
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:"#1a1e28",borderColor:"#252a38",borderWidth:1,
          titleFont:{family:"'Inter Tight',sans-serif",size:12,weight:"800"},
          bodyFont:{family:"'Inter Tight',sans-serif",size:13},
          titleColor:"#FF1919",bodyColor:"#fff",padding:14,cornerRadius:8,
          callbacks:{label:c=>c.parsed.y!==null?` ${c.dataset.label}: ${c.parsed.y} pts`:null}}},
      scales:{
        x:{ticks:{color:"#4a5068",font:{family:"'Inter Tight'",size:11,weight:"600"}},
          grid:{color:"rgba(255,255,255,.03)"},border:{color:"#252a38"}},
        y:{ticks:{color:"#4a5068",font:{family:"'Inter Tight'",size:12}},
          grid:{color:"rgba(255,255,255,.03)"},border:{color:"#252a38"},
          title:{display:true,text:"CUMULATIVE POINTS",color:"#4a5068",
            font:{family:"'Inter Tight'",size:10,weight:"700"}}}}}});
  D.standings.forEach((s,i)=>{chart.setDatasetVisibility(i,vis[s.name]!==false);});
  chart.update();
}

window.addEventListener("DOMContentLoaded",()=>{initShapes();renderAll();});
</script>
